{% extends "base.html" %}

{% block page_title %}
Edit Supplier
{% endblock %}

{% block content %}

<div class="section-card">

    <h4 class="mb-4">Edit Supplier</h4>

    <form method="post"
          action="/supplier/update">

        <input type="hidden"
               name="id"
               value="{{ supplier.id }}">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Supplier Name</label>
                <input type="text"
                       name="supplier_name"
                       value="{{ supplier.supplier_name }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Company Name</label>
                <input type="text"
                       name="company_name"
                       value="{{ supplier.company_name }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>GST Number</label>
                <input type="text"
                       name="gst_number"
                       value="{{ supplier.gst_number }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Phone</label>
                <input type="text"
                       name="phone"
                       value="{{ supplier.phone }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Mobile</label>
                <input type="text"
                       name="mobile"
                       value="{{ supplier.mobile }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email"
                       name="email"
                       value="{{ supplier.email }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>State</label>
                <input type="text"
                       name="state"
                       value="{{ supplier.state }}"
                       class="form-control">
            </div>

            <div class="col-md-12 mb-3">
                <label>Address</label>

                <textarea
                    name="address"
                    rows="4"
                    class="form-control">{{ supplier.address }}</textarea>
            </div>

        </div>

        <button
            type="submit"
            class="btn btn-success">
            Update Supplier
        </button>

    </form>

</div>

{% endblock %}
