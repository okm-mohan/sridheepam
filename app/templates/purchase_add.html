{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/purchase_add.css">
{% endblock %}

{% block content %}

<div class="purchase-add-page">

    <div class="page-header">
        <div>
            <h1>Purchase Entry</h1>
            <p>Create New Purchase Invoice</p>
        </div>

        <a href="/purchase" class="btn-back">
            Back
        </a>
    </div>

    <form method="post" action="/purchase/save">

        <div class="glass-card">

            <div class="form-grid">

                <div>
                    <label>Purchase No</label>
                    <input
                        type="text"
                        name="purchase_no"
                        value="{{ purchase_no }}"
                        readonly
                    >
                </div>

                <div>
                    <label>Purchase Date</label>
                    <input
                        type="date"
                        name="purchase_date"
                        value="{{ today }}"
                        required
                    >
                </div>

                <div>
                    <label>Supplier</label>

                    <select
                        name="supplier_id"
                        required
                    >
                        <option value="">
                            Select Supplier
                        </option>

                        {% for s in suppliers %}
                        <option value="{{ s.id }}">
                            {{ s.supplier_name }}
                        </option>
                        {% endfor %}

                    </select>

                </div>

                <div>
                    <label>Invoice No</label>
                    <input
                        type="text"
                        name="invoice_no"
                    >
                </div>

                <div>
                    <label>Invoice Date</label>
                    <input
                        type="date"
                        name="invoice_date"
                    >
                </div>

            </div>

        </div>

        <!-- Item Grid -->

        <div class="glass-card">

            <div class="item-header">

                <h3>Purchase Items</h3>

                <button
                    type="button"
                    class="btn-add-row"
                    onclick="addRow()"
                >
                    + Add Row
                </button>

            </div>

            <table id="purchaseTable">

                <thead>

                    <tr>
                        <th>Material</th>
                        <th>Qty</th>
                        <th>Rate</th>
                        <th>GST %</th>
                        <th>GST Amt</th>
                        <th>Total</th>
                        <th></th>
                    </tr>

                </thead>

                <tbody id="purchaseBody">

                </tbody>

            </table>

        </div>

        <!-- Totals -->

        <div class="glass-card totals-card">

            <div class="total-row">
                <span>Sub Total</span>
                <span id="subTotal">0.00</span>
            </div>

            <div class="total-row">
                <span>GST Total</span>
                <span id="gstTotal">0.00</span>
            </div>

            <div class="total-row grand">
                <span>Grand Total</span>
                <span id="grandTotal">0.00</span>
            </div>

            <button
                type="submit"
                class="btn-save"
            >
                Save Purchase
            </button>

        </div>

    </form>

</div>

{% endblock %}

{% block extra_js %}

<script>

let materialsOptions = `
{% for m in materials %}
<option value="{{ m.id }}">
    {{ m.material_name }}
</option>
{% endfor %}
`;

</script>

<script src="/static/js/purchase_add.js"></script>

{% endblock %}
