{% extends "base.html" %}

{% block title %}Company{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', path='css/company.css') }}">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<div class="company-page">

    <div class="page-header">

        <div>
            <h2>
                <i class="fa-solid fa-building"></i>
                Company Information
            </h2>

            <p>
                Manage your company details used throughout the ERP system.
            </p>
        </div>

        <div class="company-logo-card">
            <div class="logo-circle">
                <i class="fa-solid fa-city"></i>
            </div>
        </div>

    </div>


    <form class="company-card">

        <!-- Row -->

        <div class="form-row">

            <div class="form-group">

                <label>Company Name</label>

                <div class="input-box">

                    <i class="fa-solid fa-building"></i>

                    <input
                    type="text"
                    placeholder="Enter Company Name"
                    value="Sree Dheepam Polymers">

                </div>

            </div>


            <div class="form-group">

                <label>GST Number</label>

                <div class="input-box">

                    <i class="fa-solid fa-receipt"></i>

                    <input
                    type="text"
                    placeholder="GST Number"
                    value="ABGTE102354ERGBGFG889">

                </div>

            </div>

        </div>





        <div class="form-row">

            <div class="form-group">

                <label>Phone Number</label>

                <div class="input-box">

                    <i class="fa-solid fa-phone"></i>

                    <input
                    type="text"
                    placeholder="Phone Number"
                    value="98422177889">

                </div>

            </div>

            <div class="form-group">

                <label>Email Address</label>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                    type="email"
                    placeholder="Email"
                    value="sridheepam@gmail.com">

                </div>

            </div>

        </div>





        <div class="form-row">

            <div class="form-group">

                <label>City</label>

                <div class="input-box">

                    <i class="fa-solid fa-location-dot"></i>

                    <input
                    type="text"
                    placeholder="City"
                    value="Coimbatore">

                </div>

            </div>


            <div class="form-group">

                <label>State</label>

                <div class="input-box">

                    <i class="fa-solid fa-map"></i>

                    <input
                    type="text"
                    placeholder="State"
                    value="Tamil Nadu">

                </div>

            </div>


            <div class="form-group">

                <label>Pincode</label>

                <div class="input-box">

                    <i class="fa-solid fa-location-crosshairs"></i>

                    <input
                    type="text"
                    placeholder="Pincode"
                    value="641032">

                </div>

            </div>

        </div>





        <div class="form-group">

            <label>Address</label>

            <div class="input-box textarea">

                <i class="fa-solid fa-location-dot"></i>

                <textarea rows="5"
                placeholder="Address">Velanthavalam Road,
Othakkalmandapam,
Coimbatore.</textarea>

            </div>

        </div>



        <div class="button-area">

            <button class="save-btn">

                <i class="fa-solid fa-floppy-disk"></i>

                Save Company

            </button>

           

        </div>

    </form>

</div>

<script src="{{ url_for('static', path='js/company.js') }}"></script>

{% endblock %}
