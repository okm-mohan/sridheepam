<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sridheepam ERP - Login</title>

    <link rel="stylesheet" href="/static/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<div class="login-page">

    <div class="login-left">
        <div class="brand">

            <div class="logo">
                <i class="fa-solid fa-building"></i>
            </div>

            <h1>Sridheepam ERP</h1>

            <p>
                Manufacturing ERP Management System
            </p>

            <ul class="features">
                <li><i class="fa-solid fa-circle-check"></i> Purchase Management</li>
                <li><i class="fa-solid fa-circle-check"></i> Sales Management</li>
                <li><i class="fa-solid fa-circle-check"></i> Inventory Tracking</li>
                <li><i class="fa-solid fa-circle-check"></i> Production Planning</li>
                <li><i class="fa-solid fa-circle-check"></i> Reports & Analytics</li>
            </ul>

        </div>
    </div>

    <div class="login-right">

        <div class="login-card">

            <h2>Welcome Back</h2>

            <p class="subtitle">
                Sign in to continue
            </p>

            <form action="/login" method="post" id="loginForm">

                <div class="input-group">

                    <label>Username</label>

                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>

                        <input
                            type="text"
                            name="username"
                            id="username"
                            placeholder="Enter Username"
                            required
                            autofocus
                        >
                    </div>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            name="password"
                            id="password"
                            placeholder="Enter Password"
                            required
                        >

                        <span class="toggle-password" onclick="togglePassword()">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </span>

                    </div>

                </div>

                <div class="options">

                    <label class="remember">

                        <input type="checkbox" name="remember">

                        Remember Me

                    </label>

                    <a href="#" class="forgot">
                        Forgot Password?
                    </a>

                </div>

                <button type="submit" class="login-btn">

                    <i class="fa-solid fa-right-to-bracket"></i>

                    Login

                </button>

            </form>

            <div class="footer">

                Version 1.0

            </div>

        </div>

    </div>

</div>

<script src="/static/js/login.js"></script>

</body>
</html>
