{% extends "base.html" %}

{% block page_title %}
Edit Customer
{% endblock %}

{% block content %}

<div class="section-card">

    <h4 class="mb-4">Edit Customer</h4>

    <form method="post"
          action="/customer/update">

        <input type="hidden"
               name="id"
               value="{{ customer.id }}">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Customer Name</label>
                <input type="text"
                       name="customer_name"
                       value="{{ customer.customer_name }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Company Name</label>
                <input type="text"
                       name="company_name"
                       value="{{ customer.company_name }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Mobile</label>
                <input type="text"
                       name="mobile"
                       value="{{ customer.mobile }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email"
                       name="email"
                       value="{{ customer.email }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>GST Number</label>
                <input type="text"
                       name="gst_number"
                       value="{{ customer.gst_number }}"
                       class="form-control">
            </div>

            <div class="col-md-12 mb-3">
                <label>Address</label>

                <textarea
                    name="address"
                    rows="4"
                    class="form-control">{{ customer.address }}</textarea>
            </div>

        </div>

        <button
            type="submit"
            class="btn btn-success">
            Update Customer
        </button>

    </form>

</div>

{% endblock %}
