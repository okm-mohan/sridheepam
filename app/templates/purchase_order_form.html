{% extends "base.html" %}{% block page_title %}New Purchase Order{% endblock %}{% block content %}<style>.po-form{max-width:1000px;margin:auto;background:#fff;padding:24px;border-radius:12px}.po-form input,.po-form select,.po-form textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:7px}.po-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.po-items{width:100%;margin-top:18px;border-collapse:collapse}.po-items th,.po-items td{padding:7px}.po-save{margin-top:18px;padding:12px 18px;border:0;border-radius:8px;background:#2563eb;color:white;font-weight:800}</style><form class="po-form" method="post" action="/purchase-orders/save"><h1>New Purchase Order</h1><div class="po-grid"><label>PO Number<input name="po_number" value="{{ po_number }}" required></label><label>PO Date<input type="date" name="po_date" value="{{ today }}" required></label><label>Supplier<select name="supplier_id" required><option value="">Select supplier</option>{% for supplier in suppliers %}<option value="{{ supplier.id }}">{{ supplier.name }}</option>{% endfor %}</select></label><label>Delivery Address<textarea name="delivery_address"></textarea></label></div><table class="po-items"><thead><tr><th>Item description</th><th>Qty</th><th>Unit</th><th>Rate</th></tr></thead><tbody>{% for n in range(5) %}<tr><td><input name="item_description" placeholder="Item"></td><td><input name="quantity" type="number" step=".01"></td><td><input name="unit" placeholder="Nos"></td><td><input name="unit_price" type="number" step=".01"></td></tr>{% endfor %}</tbody></table><label>Notes<textarea name="notes"></textarea></label><button class="po-save">Generate Purchase Order</button></form>{% endblock %}
