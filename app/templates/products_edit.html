{% extends "base.html" %}

{% block page_title %}
Edit Product
{% endblock %}

{% block content %}

<div class="section-card">

    <h4 class="mb-4">Edit Product</h4>

    <form method="post"
          action="/product/update">

        <input type="hidden"
               name="id"
               value="{{ product.id }}">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Product Name</label>
                <input type="text"
                       name="product_name"
                       value="{{ product.product_name }}"
                       class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>Product Code</label>
                <input type="text"
                       name="product_code"
                       value="{{ product.product_code }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Category</label>
                <input type="text"
                       name="category"
                       value="{{ product.category }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Product Type</label>
                <input type="text"
                       name="product_type"
                       value="{{ product.product_type }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Size</label>
                <input type="text"
                       name="size"
                       value="{{ product.size }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>GSM</label>
                <input type="text"
                       name="gsm"
                       value="{{ product.gsm }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Color</label>
                <input type="text"
                       name="color"
                       value="{{ product.color }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>HSN Code</label>
                <input type="text"
                       name="hsn_code"
                       value="{{ product.hsn_code }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>GST %</label>
                <input type="number"
                       step="0.01"
                       name="gst_percent"
                       value="{{ product.gst_percent }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Purchase Price</label>
                <input type="number"
                       step="0.01"
                       name="purchase_price"
                       value="{{ product.purchase_price }}"
                       class="form-control">
            </div>

            <div class="col-md-4 mb-3">
                <label>Sale Price</label>
                <input type="number"
                       step="0.01"
                       name="sale_price"
                       value="{{ product.sale_price }}"
                       class="form-control">
            </div>

        </div>

        <button type="submit"
                class="btn btn-success">
            Update Product
        </button>

    </form>

</div>

{% endblock %}
